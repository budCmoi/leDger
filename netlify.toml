[build]
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["backend/dist/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/healthz"
  to = "/.netlify/functions/api/healthz"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200