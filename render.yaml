services:
  - type: web
    name: ledger-premium-budcmoi
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start --workspace backend
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: VITE_API_URL
        value: /api
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FIREBASE_PROJECT_ID
        value: compta-b4e23
      - key: ADMIN_EMAILS
        value: ''
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyAMbLiRzqEEkFp1cKM7MC-Wp5dRVxqET2s
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: compta-b4e23.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: compta-b4e23
      - key: VITE_FIREBASE_APP_ID
        value: 1:467150472454:web:b365788cc1108a39b24a87
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: '467150472454'